# debspin — ansible-pull entrypoint. Runs on the local machine each pull.
# Profile comes from /etc/debspin/host.yml (set by bootstrap), overridable by
# committing host_vars/<hostname>.yml.
- name: Converge this machine
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    profile: desktop            # default; overridden by /etc/debspin/host.yml or host_vars
    target_user: "{{ lookup('env','SUDO_USER') | default(ansible_user_id, true) }}"
    # Include Convertible/Detachable so 2-in-1s (e.g. Acer Spin) get lid handling.
    is_laptop: "{{ (ansible_form_factor | default('')) in ['Laptop','Notebook','Portable','Convertible','Detachable'] }}"

  # profile is supplied by bootstrap via  --extra-vars @/etc/debspin/host.yml
  # (or commit host_vars/<hostname>.yml and add it to an inventory to override)

  pre_tasks:
    - name: Show what we're doing
      ansible.builtin.debug:
        msg: "debspin converging '{{ ansible_hostname }}' as profile='{{ profile }}' (user={{ target_user }}, laptop={{ is_laptop }})"

    # Resource affordability report — warn on any requested extra the box can't afford.
    - name: Resource report
      ansible.builtin.debug:
        msg: >-
          RAM={{ ansible_memtotal_mb }}MB, disk_free={{ ((((ansible_mounts | default([]) | selectattr('mount','equalto','/') | map(attribute='size_available') | list) + [0]) | first) / 1048576) | int }}MB, cpus={{ ansible_processor_vcpus }}.
          Chrome {{ 'OK' if ansible_memtotal_mb|int >= min_mem_chrome_mb else 'TOO SMALL' }};
          Docker {{ 'OK' if ansible_memtotal_mb|int >= min_mem_docker_mb else 'TOO SMALL' }}.

  roles:
    - role: base                                                    # always

    - role: ssh-server                                             # always
    - role: tailscale                                              # always (access + naming)
    - role: samba                                                  # LAN name resolution + file sharing
      when: (install_type | default('lan')) == 'lan'

    - role: fonts
      when: profile in ['desktop','lean-desktop']
    - role: xrdp
      when: profile in ['desktop','lean-desktop']
    - role: xfce-desktop
      when: profile in ['desktop','lean-desktop']
    - role: power-lid
      when: is_laptop | bool

    - role: runtimes                                              # Python (uv) + Node (nvm)

    # --- coding agents: install only, gated by the checkbox choices ---
    - role: claude-code
      when: agents.claude_code | default(false) | bool
    - role: codex
      when: agents.codex | default(false) | bool
    - role: agy-cli
      when: agents.agy_cli | default(false) | bool
    - role: opencode
      when: agents.opencode | default(true) | bool
    - role: hermes
      when: agents.hermes | default(false) | bool
    - role: vscode
      when: agents.vscode | default(false) | bool

    # --- the core: fleet-wide skills + MCP servers + plugins ---
    - role: agent-config

    # --- optional extras: run only if the feature is on AND the box can afford it ---
    - role: cli-tools
      when: features.cli_tools | default(false) | bool
    - role: auto-maintenance
      when: features.auto_maintenance | default(false) | bool
    - role: mosh
      when: features.mosh | default(false) | bool
    - role: chrome
      when:
        - features.chrome | default(false) | bool
        - profile != 'headless'
        - (ansible_memtotal_mb | int) >= (min_mem_chrome_mb | int)
    - role: docker
      when:
        - features.docker | default(false) | bool
        - (ansible_memtotal_mb | int) >= (min_mem_docker_mb | int)
