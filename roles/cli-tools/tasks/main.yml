# cli-tools — modern terminal quality-of-life (all Debian main, secret-free).
- name: Install modern CLI tools
  ansible.builtin.apt:
    name:
      - fzf          # fuzzy finder (Ctrl-R history, etc.)
      - ripgrep      # rg
      - fd-find      # fd (binary: fdfind)
      - bat          # better cat (binary: batcat)
      - eza          # better ls
      - zoxide       # smart cd
      - btop         # better top
      - git-delta    # pretty git diffs
      - jq
    state: present
    install_recommends: no
  become: true

- name: Sensible aliases + fzf keybindings for all users
  ansible.builtin.copy:
    dest: /etc/profile.d/debspin-cli.sh
    mode: "0644"
    content: |
      # debspin cli-tools
      alias ls='eza --group-directories-first'
      alias ll='eza -l --group-directories-first'
      alias la='eza -la --group-directories-first'
      alias cat='batcat --paging=never'
      alias fd='fdfind'
      command -v zoxide >/dev/null && eval "$(zoxide init bash)"
      [ -f /usr/share/doc/fzf/examples/key-bindings.bash ] && . /usr/share/doc/fzf/examples/key-bindings.bash
      export BAT_THEME=ansi
  become: true

- name: git — use delta as the pager (nicer diffs)
  ansible.builtin.copy:
    dest: /etc/gitconfig
    mode: "0644"
    content: |
      [core]
        pager = delta
      [interactive]
        diffFilter = delta --color-only
      [delta]
        navigate = true
      [init]
        defaultBranch = main
  become: true
