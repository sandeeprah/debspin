# agy-cli — Google Antigravity CLI (binary: `agy`). Standalone installer, no Node.
# Install only; first `agy` run does interactive Google sign-in (keyring), so no
# secrets in this repo. Linux-supported; installs to ~/.local/bin/agy.
- name: Install Antigravity CLI (agy)
  ansible.builtin.shell: |
    set -e
    curl -fsSL https://antigravity.google/cli/install.sh | bash
  args:
    creates: "/home/{{ target_user }}/.local/bin/agy"
  become: true
  become_user: "{{ target_user }}"
  environment:
    HOME: "/home/{{ target_user }}"

- name: Configure PATH/shell for agy (idempotent)
  ansible.builtin.shell: |
    export PATH="$HOME/.local/bin:$PATH"
    command -v agy >/dev/null && agy install || true
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ target_user }}"
  environment:
    HOME: "/home/{{ target_user }}"
  changed_when: false

- name: Note
  ansible.builtin.debug:
    msg: "agy installed to ~/.local/bin. Run `agy` once to sign in with Google (interactive browser flow)."
