# auto-maintenance — keep the box patched & (on cloud) protected. Secret-free.
- name: Unattended security upgrades
  ansible.builtin.apt:
    name: [unattended-upgrades, needrestart]
    state: present
    install_recommends: no
  become: true

- name: Enable automatic updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20debspin-auto
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
  become: true

- name: needrestart non-interactive (don't hang pulls/upgrades)
  ansible.builtin.copy:
    dest: /etc/needrestart/conf.d/debspin.conf
    mode: "0644"
    content: |
      $nrconf{restart} = 'a';
  become: true

# --- Cloud boxes: block SSH brute-force and close everything but SSH+Tailscale ---
- name: Cloud hardening (fail2ban + ufw)
  when: (install_type | default('lan')) == 'cloud'
  become: true
  block:
    - name: Install fail2ban + ufw
      ansible.builtin.apt:
        name: [fail2ban, ufw]
        state: present
        install_recommends: no
    - name: Allow SSH + Tailscale, default deny inbound
      ansible.builtin.shell: |
        ufw --force default deny incoming
        ufw --force default allow outgoing
        ufw allow 22/tcp
        ufw allow in on tailscale0 || true
        ufw --force enable
      changed_when: false
    - name: Enable fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        enabled: true
        state: started
