# tailscale — mesh VPN so you reach every machine from anywhere (no public
# ports) and names resolve everywhere (MagicDNS). Reached: RDP, SSH, VS Code.
- name: Add Tailscale apt repo key
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/debian/{{ ansible_distribution_release }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"
  become: true

# Write a deb822 .sources file directly. The classic apt_repository module shells
# out to apt-key/gpg, which modern Debian (13+) removes from minimal images —
# "Either apt-key or gpg binary is required, but neither could be found."
- name: Add Tailscale apt repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/tailscale.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: https://pkgs.tailscale.com/stable/debian
      Suites: {{ ansible_distribution_release }}
      Components: main
      Signed-By: /usr/share/keyrings/tailscale-archive-keyring.gpg
  become: true

- name: Install tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true
  become: true

- name: Enable tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started
  become: true

# Join YOUR tailnet with a one-time interactive:  sudo tailscale up
- name: Reminder to authenticate (first run only)
  ansible.builtin.debug:
    msg: "Run 'sudo tailscale up' once to join the tailnet."
