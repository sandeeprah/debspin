# codex — OpenAI Codex CLI. Install only; sign in later with `codex`.
- name: Install Codex CLI (npm via nvm Node)
  ansible.builtin.shell: |
    export NVM_DIR="$HOME/.config/nvm"; . "$NVM_DIR/nvm.sh" 2>/dev/null || true
    command -v codex >/dev/null || npm install -g @openai/codex
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ target_user }}"
  environment:
    HOME: "/home/{{ target_user }}"
  register: cx
  changed_when: "'added' in cx.stdout or 'changed' in cx.stdout or 'updated' in cx.stdout"
