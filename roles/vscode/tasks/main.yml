# vscode — VS Code (GUI editor on desktops; also hosts the Remote-SSH server & `code` CLI).
- name: Microsoft signing key
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /usr/share/keyrings/microsoft.asc
    mode: "0644"
  become: true

# deb822 .sources file — apt_repository shells out to apt-key/gpg, gone from
# minimal Debian 13+. Writing the file directly needs no gpg/apt-key.
- name: VS Code apt repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/vscode.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: https://packages.microsoft.com/repos/code
      Suites: stable
      Components: main
      Architectures: amd64 arm64
      Signed-By: /usr/share/keyrings/microsoft.asc
  become: true

- name: Install code
  ansible.builtin.apt:
    name: code
    state: present
    update_cache: true
    install_recommends: no
  become: true
