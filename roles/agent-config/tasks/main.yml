# agent-config — deploy the SHARED, cross-platform agent config (skills + MCP +
# instructions). The content + applier live in their own repo so the same thing
# runs on Windows too:  github.com/sandeeprah/agent-config
# Here debspin just clones it and runs apply.sh at the end of each converge.
- name: Clone/update agent-config
  ansible.builtin.git:
    repo: "{{ agent_config_repo | default('https://github.com/sandeeprah/agent-config') }}"
    dest: "/home/{{ target_user }}/.local/share/agent-config"
    depth: 1
    force: true
  become: true
  become_user: "{{ target_user }}"

- name: Apply agent-config to whichever agents are installed
  ansible.builtin.command: bash apply.sh
  args:
    chdir: "/home/{{ target_user }}/.local/share/agent-config"
  become: true
  become_user: "{{ target_user }}"
  environment:
    HOME: "/home/{{ target_user }}"
  changed_when: false
