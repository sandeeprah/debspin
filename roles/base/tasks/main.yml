# base — common to every machine.
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Core utilities (tmux = detached shells that survive a GUI session kill)
  ansible.builtin.apt:
    name: [ca-certificates, curl, git, htop, rsync, unzip, ncdu, jq, tmux]
    state: present
    install_recommends: no
  become: true

# Linger = the user's systemd services (agents/workloads) keep running with
# nobody logged in — so ending a disconnected GUI session never stops real work.
- name: Enable linger for {{ target_user }} (user services survive logout)
  ansible.builtin.command: "loginctl enable-linger {{ target_user }}"
  args:
    creates: "/var/lib/systemd/linger/{{ target_user }}"
  become: true

# Small VMs: zram (compressed RAM swap) makes 2-4 GB much happier.
- name: zram for low-memory machines (< 6 GB)
  when: (ansible_memtotal_mb | int) < 6000
  become: true
  block:
    - name: Install zram-tools
      ansible.builtin.apt:
        name: zram-tools
        state: present
    - name: Size zram to ~100% of RAM
      ansible.builtin.lineinfile:
        path: /etc/default/zramswap
        regexp: "^PERCENT="
        line: "PERCENT=100"
        create: true
      notify: restart zramswap

- name: Prefer zram over disk swap (swappiness high) on low-mem boxes
  when: (ansible_memtotal_mb | int) < 6000
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "180"
    state: present
    reload: true
  become: true
