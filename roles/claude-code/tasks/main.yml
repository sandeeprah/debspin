# claude-code — Anthropic Claude Code CLI. Install only; sign in later with `claude`.
- name: Install Claude Code CLI (npm via nvm Node)
  ansible.builtin.shell: |
    export NVM_DIR="$HOME/.config/nvm"; . "$NVM_DIR/nvm.sh" 2>/dev/null || true
    command -v claude >/dev/null || npm install -g @anthropic-ai/claude-code
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ target_user }}"
  environment:
    HOME: "/home/{{ target_user }}"
  register: cc
  changed_when: "'added' in cc.stdout or 'changed' in cc.stdout or 'updated' in cc.stdout"
