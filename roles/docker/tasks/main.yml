# docker — containers (only on capable boxes; guarded by RAM/disk in local.yml).
- name: Install Docker (Debian's docker.io + compose plugin)
  ansible.builtin.apt:
    name: [docker.io, docker-compose-v2]
    state: present
    install_recommends: no
  become: true

- name: Enable dockerd
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  become: true

- name: Let the user run docker without sudo
  ansible.builtin.user:
    name: "{{ target_user }}"
    groups: docker
    append: true
  become: true
