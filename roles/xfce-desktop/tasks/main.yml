# xfce-desktop — the proven dark Xfce-over-xrdp desktop (from AcerSpin).
# Config is applied as xfconf perchannel XML (works headless, no live session
# needed) + an xscreensaver disable. On next login, xfsettingsd applies it.
- name: Install Xfce + the pieces we standardized on
  ansible.builtin.apt:
    name:
      - xfce4                     # session, wm (xfwm4), panel, settings, xfdesktop, thunar, appfinder
      - xfce4-terminal
      - xfce4-docklike-plugin     # (available if we later want a grouping dock)
      - xfce4-pulseaudio-plugin   # volume in the panel
      - xfce4-screenshooter
      - network-manager-gnome     # nm-applet (WiFi/network tray)
      - greybird-gtk-theme        # Greybird-dark: GTK + xfwm4 borders
      - papirus-icon-theme        # Papirus-Dark icons
      - fonts-dejavu
      # Desktop plumbing that `install_recommends: no` would otherwise strip.
      # Without these the desktop comes up half-baked over xrdp: generic
      # (gearwheel/rocket) icons, no Thunar home/trash, no user folders.
      - librsvg2-common           # SVG gdk-pixbuf loader — Papirus is SVG; without it, icons fall back to generic
      - gvfs                      # Thunar: home, trash, mounts, network
      - gvfs-backends
      - tumbler                   # thumbnails
      - xdg-user-dirs             # Home/Desktop/Documents/... exist
      - xdg-user-dirs-gtk
      - shared-mime-info          # mime DB (icon/thumbnail lookup)
      - libgtk-3-bin              # gtk-update-icon-cache
      - dbus-x11                  # dbus-launch / session-bus helpers
      - adwaita-icon-theme        # sane fallback icon set
    state: present
    install_recommends: no        # kept off (so xscreensaver/light-locker aren't pulled back); deps listed explicitly above
  become: true

- name: Remove things that misbehave over xrdp (screensaver/locker)
  ansible.builtin.apt:
    name: [xscreensaver, light-locker, xfce4-screensaver]
    state: absent
  become: true

- name: Ensure the user's xfconf dir exists
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/xfce4/xfconf/xfce-perchannel-xml"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0700"
  become: true

- name: Deploy the proven xfconf settings (theme, icons, dark bg, compositor off)
  ansible.builtin.copy:
    src: "xfconf/{{ item }}"
    dest: "/home/{{ target_user }}/.config/xfce4/xfconf/xfce-perchannel-xml/{{ item }}"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0644"
  loop:
    - xsettings.xml        # Greybird-dark GTK theme, Papirus-Dark icons, fonts
    - xfwm4.xml            # Greybird-dark window borders, compositing = false
    - xfce4-desktop.xml    # solid dark backdrop, no desktop icons
  become: true

# Panel config is templated: the directory-menu base path follows the actual
# user (no hardcoded home/username anywhere).
- name: Deploy the panel config (top panel + centered dock)
  ansible.builtin.template:
    src: xfconf/xfce4-panel.xml.j2
    dest: "/home/{{ target_user }}/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.xml"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0644"
  become: true

# The dock launchers reference .desktop files by id; ship them, or the dock
# shows dead green rockets (xfce4-panel's default launcher icon).
- name: Deploy the dock launcher .desktop files
  ansible.builtin.copy:
    src: panel/
    dest: "/home/{{ target_user }}/.config/xfce4/panel/"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0644"
    directory_mode: "0755"
  become: true

- name: Ensure the user's autostart dir exists
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/autostart"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0700"
  become: true

- name: Disable xscreensaver autostart (belt-and-braces)
  ansible.builtin.copy:
    src: "autostart/xscreensaver.desktop"
    dest: "/home/{{ target_user }}/.config/autostart/xscreensaver.desktop"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0644"
  become: true

- name: Point the xrdp session at Xfce
  ansible.builtin.copy:
    dest: "/home/{{ target_user }}/.xsession"
    content: "startxfce4\n"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0644"
  become: true

- name: Install the debspin-gui toggle (on/off/status)
  ansible.builtin.copy:
    src: debspin-gui
    dest: /usr/local/bin/debspin-gui
    mode: "0755"
  become: true

# On lean-desktop/VM profiles, default the GUI OFF (headless until you want it).
- name: Default the desktop OFF on lean profiles (toggle on with 'debspin-gui on')
  ansible.builtin.systemd:
    name: xrdp
    enabled: "{{ profile != 'lean-desktop' }}"
    state: "{{ 'started' if profile != 'lean-desktop' else 'stopped' }}"
  become: true
