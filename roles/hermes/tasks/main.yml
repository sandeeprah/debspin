# hermes — Nous Research Hermes Agent (self-improving agent framework).
# https://github.com/nousresearch/hermes-agent
# Two modes: interactive `hermes` CLI, and `hermes gateway` (long-running daemon
# for Telegram/Discord/Slack/etc.). Providers: OpenRouter/OpenAI/Anthropic/custom
# -> use free APIs or a shared Ollama endpoint. Keys come from Bitwarden (secrets
# play), never this repo.
- name: Prereqs the installer uses (it also pulls python3.11/node itself)
  ansible.builtin.apt:
    name: [ripgrep, ffmpeg, git, curl]
    state: present
    install_recommends: no
  become: true

- name: Is hermes already installed?
  ansible.builtin.command: bash -lc 'command -v hermes'
  register: hermes_check
  failed_when: false
  changed_when: false
  become: true
  become_user: "{{ target_user }}"

- name: Install Hermes Agent (official installer)
  ansible.builtin.shell: |
    set -e
    curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
  when: hermes_check.rc != 0
  become: true
  become_user: "{{ target_user }}"
  environment:
    HOME: "/home/{{ target_user }}"

# --- Optional autonomous mode: run the gateway as a systemd USER service. ---
# Off by default: it needs a one-time interactive `hermes gateway setup` first
# (provider + bot tokens from Bitwarden). With linger enabled (base role) it
# keeps running with nobody logged in, and survives a GUI session being killed.
- name: Hermes gateway service dir
  when: hermes_gateway_enabled | default(false) | bool
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/systemd/user"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0755"
  become: true

- name: Hermes gateway user service unit
  when: hermes_gateway_enabled | default(false) | bool
  ansible.builtin.copy:
    dest: "/home/{{ target_user }}/.config/systemd/user/hermes-gateway.service"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0644"
    content: |
      [Unit]
      Description=Hermes Agent gateway (messaging bots)
      After=network-online.target
      [Service]
      Type=simple
      ExecStart=%h/.local/bin/hermes gateway start
      Restart=on-failure
      RestartSec=10
      MemoryMax={{ hermes_mem_max | default('700M') }}
      [Install]
      WantedBy=default.target
  become: true
  notify: reload hermes gateway

- name: Note
  ansible.builtin.debug:
    msg: >-
      hermes installed. Run `hermes setup` once (pick OpenRouter/Ollama + keys).
      For bots: `hermes gateway setup`, set hermes_gateway_enabled=true, then it
      runs as a user service (survives logout via linger).
