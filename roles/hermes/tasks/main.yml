# hermes — Nous Research Hermes Agent (install only; run `hermes setup` to sign in).
# https://github.com/nousresearch/hermes-agent
- name: Prereqs the installer uses
  ansible.builtin.apt:
    name: [ripgrep, ffmpeg, git, curl]
    state: present
    install_recommends: no
  become: true

- name: Is hermes already installed?
  ansible.builtin.command: bash -lc 'command -v hermes'
  register: hermes_check
  failed_when: false
  changed_when: false
  become: true
  become_user: "{{ target_user }}"

- name: Install Hermes Agent (official installer)
  ansible.builtin.shell: |
    set -e
    curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
  when: hermes_check.rc != 0
  become: true
  become_user: "{{ target_user }}"
  environment:
    HOME: "/home/{{ target_user }}"

- name: Note
  ansible.builtin.debug:
    msg: "hermes installed. Run `hermes setup` to pick a provider + sign in. For bots: `hermes gateway setup`."
