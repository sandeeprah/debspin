# Reload/enable the hermes gateway user service (runs as the target user).
- name: reload hermes gateway
  ansible.builtin.systemd:
    name: hermes-gateway
    scope: user
    daemon_reload: true
    enabled: true
    state: started
  become: true
  become_user: "{{ target_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ target_uid | default(1000) }}"
