# chrome — Google Chrome (desktop/lean profiles). Preferred browser.
- name: Google signing key
  ansible.builtin.get_url:
    url: https://dl.google.com/linux/linux_signing_key.pub
    dest: /usr/share/keyrings/google-chrome.asc
    mode: "0644"
  become: true

# deb822 .sources file — apt_repository shells out to apt-key/gpg, gone from
# minimal Debian 13+. Writing the file directly needs no gpg/apt-key.
- name: Google Chrome apt repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/google-chrome.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: http://dl.google.com/linux/chrome/deb/
      Suites: stable
      Components: main
      Architectures: amd64
      Signed-By: /usr/share/keyrings/google-chrome.asc
  become: true

- name: Install google-chrome-stable
  ansible.builtin.apt:
    name: google-chrome-stable
    state: present
    update_cache: true
  become: true

# Chrome can misbehave with GPU accel over xrdp; a sane default flag.
- name: Chrome flags for xrdp (disable GPU)
  ansible.builtin.copy:
    dest: "/home/{{ target_user }}/.config/chrome-flags.conf"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0644"
    content: |
      --disable-gpu
  become: true
