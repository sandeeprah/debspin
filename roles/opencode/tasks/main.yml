# opencode — open-source terminal coding agent. No secrets in this repo.
# Provider/model + any API key are set interactively per-user with
# `opencode auth login`, or point opencode_base_url at a local/self-hosted model
# (e.g. an Ollama endpoint — no key needed). Nothing sensitive is stored here.
- name: Install opencode (standalone binary)
  ansible.builtin.shell: |
    set -e
    curl -fsSL https://opencode.ai/install | bash
  args:
    creates: "/home/{{ target_user }}/.opencode/bin/opencode"
  # The installer fetches version info over the network; a transient blip must
  # not fail the whole converge. Retry a few times. `creates` above still makes
  # it a no-op once installed, so this only loops on a genuine first-run failure.
  register: opencode_install
  retries: 3
  delay: 5
  until: opencode_install is success
  become: true
  become_user: "{{ target_user }}"
  environment:
    HOME: "/home/{{ target_user }}"

- name: Ensure opencode config dir
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/opencode"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0755"
  become: true

# Optional: default to a local/self-hosted OpenAI-compatible endpoint (keyless).
# Only written if opencode_base_url is set for the host; otherwise use
# `opencode auth login` interactively. No API keys ever live in the repo.
- name: Deploy keyless opencode config (local/self-hosted model)
  when: opencode_base_url is defined
  ansible.builtin.copy:
    dest: "/home/{{ target_user }}/.config/opencode/opencode.json"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0644"
    content: |
      {
        "$schema": "https://opencode.ai/config.json",
        "provider": {
          "local": {
            "npm": "@ai-sdk/openai-compatible",
            "options": { "baseURL": "{{ opencode_base_url }}" }
          }
        }
      }
  become: true
