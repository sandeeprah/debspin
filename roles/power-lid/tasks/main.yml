# power-lid — for laptops used remotely: closing the lid must NOT suspend
# (a suspend kills every RDP session). Two layers, per the runbook.
- name: systemd-logind — ignore the lid switch (battery / AC / docked)
  ansible.builtin.lineinfile:
    path: /etc/systemd/logind.conf
    regexp: "^#?{{ item }}="
    line: "{{ item }}=ignore"
  loop:
    - HandleLidSwitch
    - HandleLidSwitchExternalPower
    - HandleLidSwitchDocked
  become: true
  notify: restart logind

# LXQt layer only applies if LXQt is present; harmless otherwise.
- name: LXQt power manager — disable idle watcher if that config exists
  ansible.builtin.lineinfile:
    path: "/home/{{ target_user }}/.config/lxqt/lxqt-powermanagement.conf"
    regexp: "^enableIdlenessWatcher="
    line: "enableIdlenessWatcher=false"
  become: true
  ignore_errors: true
