# ssh-server — sshd hardened, key-only. Also all VS Code Remote-SSH needs.
- name: Install openssh-server
  ansible.builtin.apt:
    name: openssh-server
    state: present
  become: true

- name: Harden sshd (key-only, no root password login)
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-debspin.conf
    content: |
      # managed by debspin
      PermitRootLogin prohibit-password
      PasswordAuthentication {{ 'no' if (install_type | default('lan')) == 'cloud' else 'yes' }}
      KbdInteractiveAuthentication no
      X11Forwarding no
    mode: "0644"
  become: true
  notify: restart ssh

# NOTE: on 'cloud' install_type this sets PasswordAuthentication=no, so make sure
# your SSH public key is deployed FIRST (providers inject it at VM creation).
