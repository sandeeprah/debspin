# runtimes — Python (uv) + Node (nvm). No secrets.
- name: Build prerequisites
  ansible.builtin.apt:
    name: [build-essential, curl, git, python3, python3-venv, pipx]
    state: present
    install_recommends: no
  become: true

# --- Python: uv (fast package/venv manager) ---
- name: Install uv for the user
  ansible.builtin.shell: |
    command -v uv >/dev/null || curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: "/home/{{ target_user }}/.local/bin/uv"
  become: true
  become_user: "{{ target_user }}"
  environment:
    HOME: "/home/{{ target_user }}"

# --- Node: nvm at ~/.config/nvm (XDG path, matches this setup) + Node LTS ---
- name: Install nvm if missing
  ansible.builtin.shell: |
    export NVM_DIR="$HOME/.config/nvm"
    mkdir -p "$NVM_DIR"
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | NVM_DIR="$NVM_DIR" bash
  args:
    creates: "/home/{{ target_user }}/.config/nvm/nvm.sh"
  become: true
  become_user: "{{ target_user }}"
  environment:
    HOME: "/home/{{ target_user }}"

- name: Install Node LTS via nvm + set default
  ansible.builtin.shell: |
    export NVM_DIR="$HOME/.config/nvm"; . "$NVM_DIR/nvm.sh"
    nvm install --lts && nvm alias default 'lts/*'
  args:
    creates: "/home/{{ target_user }}/.config/nvm/alias/default"
  become: true
  become_user: "{{ target_user }}"
  environment:
    HOME: "/home/{{ target_user }}"
