# debspin inventory. For ansible-pull each machine matches itself by hostname;
# this file is mainly for pushing from a control node if you ever want to.
[all]
localhost ansible_connection=local

# Example fleet (uncomment / add as you grow):
# acerspin  ansible_host=acerspin        # lan + desktop  (host_vars/acerspin.yml)
# vm-2gb    ansible_host=vm-2gb          # cloud + lean-desktop
# agent01   ansible_host=agent01         # cloud + headless
