# debspin — shared defaults (overridable per-host in host_vars, or via
# /etc/debspin/host.yml written by bootstrap).
profile: desktop            # desktop | lean-desktop | headless
install_type: lan           # lan | cloud  (affects firewall/samba/ssh posture)

timezone: Asia/Dubai
locale: en_IN.UTF-8

# ===================================================================
# FLEET-MANAGED AGENT CONFIG — the core of debspin.
# Edit here, `git push`, every machine converges on next pull.
# NO SECRETS: MCP keys use ${ENV_VAR} refs, populated per-device.
# ===================================================================
# KEEP SKILLS CURATED AND FEW. A handful of focused skills route far better than
# hundreds — 1000+ bloats context (every skill's description is always loaded)
# and degrades selection. Do NOT bulk-vendor aggregator lists.
#
# Curated local set (bundled in this repo, reviewed):
claude_skills:
  - brainstorm          # explore options before committing
  - plan-feature        # request → ordered, codebase-grounded plan
  - design-fullstack    # data model → API → backend → frontend
  - write-tests         # behavior/edge/failure tests in the repo's style
  - code-review         # correctness/security/simplicity/perf, severity-ranked
  - debug               # reproduce → isolate → root-cause → fix → verify

# OPT-IN: git-vendor ONE specific, reviewed quality repo (cloned + auto-updated,
# its SKILL.md dirs symlinked in). Leave empty unless you want it; never add many.
claude_skill_repos: []
#   - https://github.com/anthropics/skills   # official — review its contents first

# MCP servers (Claude Code, user scope). Keys via ${VAR} refs only.
claude_mcp_servers:
  - name: fetch                       # keyless web-fetch server (Python, via uv/uvx)
    config: { type: stdio, command: uvx, args: ["mcp-server-fetch"] }
  # - name: github                    # example WITH a secret, kept out of repo:
  #   config: { type: http, url: "https://api.githubcopilot.com/mcp/",
  #             headers: { Authorization: "Bearer ${GITHUB_TOKEN}" } }

# Plugins: marketplaces + enabled map (Claude Code settings.json). Empty by default.
claude_marketplaces: {}              # e.g. { "my-org": { source: { source: github, repo: "me/plugins" } } }
claude_plugins: {}                   # e.g. { "commit-commands@my-org": true }

# xrdp: end a disconnected GUI session after this many seconds to free desktop
# RAM (0 = never, for sticky workstations). Safe — real work runs as systemd
# services (linger) or tmux, so this drops only the Xfce shell, never your work.
xrdp_disconnected_timeout: 600     # 10 min grace; survives brief network blips

# Optional extras — chosen interactively by bootstrap (written to
# /etc/debspin/host.yml). Default off so a plain run stays minimal.
features:
  cli_tools: false
  auto_maintenance: false
  mosh: false
  chrome: false
  docker: false

# Coding agents — install only (auth is interactive per-agent; no secrets in repo).
agents:
  claude_code: false
  codex: false
  agy_cli: false
  opencode: true      # sensible default
  hermes: false
  vscode: false

# Resource floors — a role is skipped (with a warning) if the box is under these,
# even if the feature was requested. Belt-and-braces on top of the wizard.
min_mem_chrome_mb: 2800
min_mem_docker_mb: 3500
min_disk_docker_mb: 4000
