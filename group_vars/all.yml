# debspin — shared defaults (overridable per-host in host_vars, or via
# /etc/debspin/host.yml written by bootstrap).
profile: desktop            # desktop | lean-desktop | headless
install_type: lan           # lan | cloud  (affects firewall/samba/ssh posture)

timezone: Asia/Dubai
locale: en_IN.UTF-8

# xrdp: end a disconnected GUI session after this many seconds to free desktop
# RAM (0 = never, for sticky workstations). Safe — real work runs as systemd
# services (linger) or tmux, so this drops only the Xfce shell, never your work.
xrdp_disconnected_timeout: 600     # 10 min grace; survives brief network blips
